<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>패스오더 상생할인 이벤트</title>
<style>
  :root{
    --green:#5BA84F; --green-deep:#2E7D32; --green-soft:#E7F1DE;
    --red:#E8607A; --red-deep:#C94060; --red-soft:#FBE3E8;
    --ink-soft:#8A928C;
    --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:var(--font);background:#fff;max-width:480px;margin:0 auto;padding-bottom:96px;}
  img{display:block;width:100%;}

  /* ===== 통이미지 + 오버레이 래퍼 ===== */
  .hero-wrap{position:relative;}
  /* 카운트박스: 통이미지 히어로(아메리카노) 아래쪽에 걸치게 오버레이.
     top은 이미지 세로 비율 기준 % (약 15.5%가 아메리카노 하단~혜택1 위 크림영역) */
  .status-overlay{
    position:absolute;
    top:22.5%;            /* 아메리카노 아래를 살짝 가리는 지점 */
    left:5.5%; right:5.5%;
    z-index:5;
  }
  .status-card{
    width:100%;background:#fff;border-radius:20px;
    box-shadow:0 10px 30px rgba(90,110,90,.18);
    padding:18px 20px;
    display:flex;flex-direction:row-reverse;align-items:center;
    gap:12px;justify-content:space-between;
  }
  .status-card .icon-wrap{flex:0 0 auto;width:88px;height:60px;border-radius:18px;
    display:flex;align-items:center;justify-content:center;position:relative;}
  .status-card .txt{flex:1;min-width:0;}
  .status-card .title-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
  .status-card .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
  .status-card .title{font-size:20px;font-weight:900;letter-spacing:-.02em;line-height:1;}
  .status-card .desc{font-size:14px;color:var(--ink-soft);font-weight:500;line-height:1.5;}
  .coupon-icon{width:50px;height:32px;display:block;}

  .status-card.live .icon-wrap{background:var(--green-soft);}
  .status-card.live .title{color:var(--green-deep);}
  .status-card.live .dot{background:var(--green);}

  .status-card.cd .icon-wrap{background:var(--red-soft);animation:wiggle 2.2s ease-in-out infinite;}
  .status-card.cd .title{color:var(--red-deep);font-variant-numeric:tabular-nums;font-size:25px;
    display:flex;align-items:baseline;gap:2px;}
  .status-card.cd .title .c{color:#E3A9B6;font-size:21px;margin:0 1px;}
  .status-card.cd .title .s{font-size:13px;font-weight:800;color:var(--ink-soft);margin-left:5px;align-self:center;}
  .status-card.cd .dot{background:var(--red);animation:blink 1.2s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}
  @keyframes wiggle{0%,88%,100%{transform:rotate(0);}91%{transform:rotate(-8deg);}94%{transform:rotate(8deg);}97%{transform:rotate(-4deg);}}
  .sparkle{position:absolute;font-size:13px;top:-2px;right:2px;animation:tw 1.6s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.15);}}

  /* ===== 메뉴 모션(가격) 섹션 ===== */
  .menu-sec{padding:26px 0 30px;text-align:center;}
  .menu-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .menu-scroll img{width:auto;height:210px;margin:0 auto;}
  .menu-cap{font-size:11.5px;color:var(--ink-soft);opacity:.75;margin-top:12px;}

  /* ===== 플로팅 버튼 ===== */
  .floating{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:480px;margin:0 auto;
    padding:12px 18px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(255,255,255,0),#fff 30%);
    pointer-events:none;}                    /* 배경은 클릭 통과 */
  .floating a{display:block;cursor:pointer;pointer-events:auto;-webkit-tap-highlight-color:rgba(0,0,0,.05);}
  .floating img{width:100%;display:block;transition:transform .12s ease;pointer-events:none;}
  .floating a:active img{transform:translateY(2px);}
</style>
</head>
<body>

  <div class="hero-wrap">
    <!-- 통이미지 (히어로+혜택1+혜택2+메뉴헤더까지) -->
    <img src="images/1_main.jpg" alt="패스오더 상생할인 이벤트">

    <!-- 카운트박스 오버레이 (JS로 상태 채움) -->
    <div class="status-overlay">
      <div id="statusCard" class="status-card live"></div>
    </div>
  </div>

  <!-- 메뉴 가격(모션) 섹션 -->
  <section class="menu-sec">
    <div class="menu-scroll">
      <img src="images/2_menu.png" alt="메뉴별 쿠폰 할인 예시">
    </div>
    <p class="menu-cap">* 메뉴·가격은 매장별로 다를 수 있는 예시예요</p>
  </section>

  <!-- 유의사항 -->
  <img src="images/4_notice.jpg" alt="유의사항">

  <!-- 플로팅 버튼 -->
  <div class="floating">
    <a id="ctaBtn" href="#"><img src="images/3_button.png" alt="매장 이벤트 확인하기"></a>
  </div>

<script>
(function(){
  // ===== 로깅 설정 =====
  // 아래 LOG_ENDPOINT에 앱스스크립트 웹 앱 URL을 넣으세요 (배포 후 생성된 주소)
  var LOG_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxrky4u2N9QmiDhRLPnmOtQaQpPBUoTM2pfga0Cdu2gTBnlqtIiv4IlZE5RN4p53pmk/exec';

  // 1) URL 파라미터에서 매장식별자 + 메시지코드 읽기
  var params = new URLSearchParams(window.location.search);
  var storeId = params.get('store_id') || params.get('web_params') || params.get('storeId') || '';
  var msgCode = params.get('msg') || params.get('msg_code') || params.get('message_code') || '';

  // 유니크 request_id 생성 (진입마다 1개). 시간+난수+브라우저정보 조합으로 충돌 방지
  function makeId(){
    var t = Date.now().toString(36);
    var r = Math.random().toString(36).slice(2, 10);
    var c = (window.crypto && crypto.getRandomValues)
      ? crypto.getRandomValues(new Uint32Array(1))[0].toString(36) : '';
    return t + '-' + r + (c ? ('-' + c) : '');
  }
  var requestId = makeId();
  var viewTime = Date.now();

  // 이벤트 전송: 앱스스크립트는 POST 시 302 리다이렉트를 거쳐 sendBeacon이 실패할 수 있어,
  // 리다이렉트를 자동으로 따라가는 GET+이미지 픽셀 방식을 사용 (이탈 중에도 전송 보장, CORS 무관)
  function logEvent(eventName, extra){
    if (!LOG_ENDPOINT || LOG_ENDPOINT.indexOf('PASTE_YOUR') === 0) return; // 미설정 시 무시
    var payload = {
      event: eventName,
      request_id: requestId,
      store_id: storeId,
      msg_code: msgCode || '',
      client_time: new Date().toISOString(),
      user_agent: navigator.userAgent,
      referrer: document.referrer || '',
      screen: (screen.width + 'x' + screen.height)
    };
    if (extra) for (var k in extra) payload[k] = extra[k];

    var qs = Object.keys(payload).map(function(k){
      return encodeURIComponent(k) + '=' + encodeURIComponent(payload[k]);
    }).join('&');

    try {
      var img = new Image();
      img.src = LOG_ENDPOINT + '?' + qs + '&_=' + Date.now(); // 캐시 방지
    } catch(err){ /* 로깅 실패는 무시 (사용자 경험 우선) */ }
  }

  // 진입 기록
  logEvent('view');

  // 2) 플로팅 버튼 링크 조립: 메시지코드에 따라 template 경로가 바뀜
  var DEFAULT_MSG = 'online_low_grade_store_0_near90_push_a'; // msg 누락 시 기본값
  var code = msgCode || DEFAULT_MSG;
  var enc = encodeURIComponent(storeId);
  var appLink = 'https://passorder.kr/template/' + code + '?web_params=' + enc + '&web_params=' + enc;
  var cta = document.getElementById('ctaBtn');
  cta.setAttribute('href', appLink);
  // 웹뷰에서 <a href> 클릭이 무시되는 경우 대비: 명시적 이동 핸들러 + 클릭 로깅
  cta.addEventListener('click', function(e){
    e.preventDefault();
    logEvent('click', { elapsed_ms: (Date.now() - viewTime) });
    // 로그 전송 여유를 아주 짧게 준 뒤 이동 (sendBeacon은 즉시 이동해도 전송됨)
    setTimeout(function(){ window.location.href = appLink; }, 80);
  });

  // 3) 시간대별 상태 전환 (20~24시 카운트다운 / 그 외 진행중)
  var card = document.getElementById('statusCard');
  function pad(n){return String(n).padStart(2,'0');}
  var couponLive = '<svg class="coupon-icon" viewBox="0 0 28 20" fill="none" preserveAspectRatio="xMidYMid meet">'+
    '<path d="M2 3.2c0-.66.54-1.2 1.2-1.2h21.6c.66 0 1.2.54 1.2 1.2v2.3a2.3 2.3 0 000 4.6v.4a2.3 2.3 0 000 4.6v.7c0 .66-.54 1.2-1.2 1.2H3.2c-.66 0-1.2-.54-1.2-1.2v-.7a2.3 2.3 0 000-4.6v-.4a2.3 2.3 0 000-4.6V3.2z" fill="#4E8B3F"/>'+
    '<circle cx="14" cy="10" r="4.2" fill="#fff"/>'+
    '<path d="M12.1 10.1l1.3 1.3 2.5-2.7" stroke="#4E8B3F" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var couponCd = '<span class="sparkle">✨</span><svg class="coupon-icon" viewBox="0 0 28 20" fill="none" preserveAspectRatio="xMidYMid meet">'+
    '<path d="M2 3.2c0-.66.54-1.2 1.2-1.2h21.6c.66 0 1.2.54 1.2 1.2v2.3a2.3 2.3 0 000 4.6v.4a2.3 2.3 0 000 4.6v.7c0 .66-.54 1.2-1.2 1.2H3.2c-.66 0-1.2-.54-1.2-1.2v-.7a2.3 2.3 0 000-4.6v-.4a2.3 2.3 0 000-4.6V3.2z" fill="#E8607A"/>'+
    '<text x="14" y="13.3" font-size="8.5" font-weight="900" fill="#fff" text-anchor="middle">?</text></svg>';

  function render(){
    var now=new Date(), h=now.getHours();
    var isCd=(h>=20 && h<24);
    if(isCd){
      var mid=new Date(now); mid.setHours(24,0,0,0);
      var d=Math.max(0,mid-now);
      var hh=Math.floor(d/3600000),mm=Math.floor((d%3600000)/60000),ss=Math.floor((d%60000)/1000);
      card.className='status-card cd';
      card.innerHTML='<div class="icon-wrap">'+couponCd+'</div>'+
        '<div class="txt"><div class="title-row"><span class="title">'+
        '<span class="u">'+pad(hh)+'</span><span class="c">:</span><span class="u">'+pad(mm)+'</span><span class="c">:</span><span class="u">'+pad(ss)+'</span>'+
        '<span class="s">남음</span></span><span class="dot"></span></div>'+
        '<div class="desc">오전 00:00이 되면<br>이벤트 혜택을 받을 수 있어요</div></div>';
    } else {
      card.className='status-card live';
      card.innerHTML='<div class="icon-wrap">'+couponLive+'</div>'+
        '<div class="txt"><div class="title-row"><span class="title">지금 혜택 진행 중!</span><span class="dot"></span></div>'+
        '<div class="desc">오늘의 2,000원 상생쿠폰,<br>지금 바로 받을 수 있어요</div></div>';
    }
  }
  render(); setInterval(render,1000);
})();
</script>
</body>
</html>
